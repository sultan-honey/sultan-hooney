<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم سلطان العسل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="dash-page">

    <div class="navbar">
        <h1>🍯 لوحة سلطان العسل</h1>
        <button class="logout-btn" id="logoutBtn" style="background:#dc3545; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-family:'Tajawal'; font-weight:bold;">تسجيل الخروج</button>
    </div>

    <div class="top-actions">
        <div class="stat-box">
            <h3>إجمالي العملاء</h3>
            <p id="totalCustomersCount">0</p>
        </div>
        <button class="excel-btn" id="exportExcelBtn">
            📊 تنزيل قاعدة العملاء (Excel)
        </button>
    </div>

    <div class="add-customer-box">
        <h2 style="margin-bottom: 20px; color:#4a3623;">إضافة عميل جديد</h2>
        <div class="form-group">
            <input type="text" id="custName" placeholder="الاسم الكامل للعميل">
            <input type="number" id="custPhone" placeholder="رقم الجوال (مثال: 0500000000)">
            <input type="text" id="custAddress" class="full-width" placeholder="العنوان بالتفصيل (الحي / الشارع / المدينة)">
            <textarea id="custOrder" class="full-width" placeholder="تفاصيل الطلب (اضغط Enter للنزول لسطر جديد لمنتج آخر)"></textarea>
            <button class="add-btn" id="addBtn">حفظ بيانات العميل</button>
        </div>
    </div>

    <div class="table-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 ابحث بالاسم أو الرقم للوصول السريع...">
        </div>
        <table>
            <thead>
                <tr>
                    <th>اسم العميل</th>
                    <th>رقم الجوال</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customersTableBody"></tbody>
        </table>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <h2 style="color:#e6b31e; margin-bottom:20px;">تفاصيل العميل والطلب</h2>
            <div id="modalData" style="font-size: 16px;"></div>
            <button onclick="closeModal()" style="background:#4a3623; color:white; border:none; padding:12px; width:100%; border-radius:10px; margin-top:20px; cursor:pointer; font-family:'Tajawal'; font-weight:bold;">إغلاق النافذة</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 style="color:#25D366; margin-bottom:20px;">✏️ تعديل بيانات العميل</h2>
            <input type="hidden" id="editCustId">
            <div class="form-group">
                <input type="text" id="editCustName" placeholder="الاسم">
                <input type="number" id="editCustPhone" placeholder="رقم الجوال">
                <input type="text" id="editCustAddress" class="full-width" placeholder="العنوان">
                <textarea id="editCustOrder" class="full-width" placeholder="تفاصيل الطلب"></textarea>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="saveEditBtn" style="background:#25D366; color:white; border:none; padding:12px; flex:1; border-radius:10px; cursor:pointer; font-family:'Tajawal'; font-weight:bold;">حفظ التعديل</button>
                <button onclick="closeEditModal()" style="background:#dc3545; color:white; border:none; padding:12px; flex:1; border-radius:10px; cursor:pointer; font-family:'Tajawal'; font-weight:bold;">إلغاء</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
